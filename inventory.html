<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Update — The Shake Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-rose-50 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <a href="index.html" class="inline-flex items-center text-sm text-gray-500 hover:text-gray-700 mb-4">← Back to Home</a>

    <header class="bg-white rounded-2xl p-6 shadow-md mb-6 border-l-4 border-pink-400">
      <h1 class="text-2xl font-bold text-gray-800">📦 Inventory Update</h1>
      <p class="text-sm text-gray-500" id="dateDisplay"></p>
      <p class="text-xs text-gray-400 mt-2">Enter the current quantity for each item. Leave blank if unchanged.</p>
    </header>

    <!-- Tabs -->
    <div class="flex flex-wrap gap-2 mb-4" id="tabs"></div>

    <!-- Content -->
    <div id="tabContent" class="bg-white rounded-2xl p-6 shadow-md mb-6"></div>

    <button id="submitBtn" class="w-full bg-pink-500 hover:bg-pink-600 disabled:bg-gray-300 text-white font-bold py-4 rounded-2xl shadow-md transition-all">
      Save Inventory
    </button>

    <div id="message" class="mt-4 text-center"></div>
  </div>

  <script type="module">
    import { INVENTORY } from './inventory-data.js';
    import { saveInventory, getTodayInventory, getLatestInventory } from './app.js';

    const today = new Date();
    document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    let activeTab = Object.keys(INVENTORY)[0];
    let formData = {}; // { categoryKey: { itemName: qty } }

    // Build tabs
    const tabsEl = document.getElementById('tabs');
    Object.entries(INVENTORY).forEach(([key, cat]) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all';
      btn.dataset.tab = key;
      btn.innerHTML = `${cat.icon} ${cat.label}`;
      btn.addEventListener('click', () => {
        activeTab = key;
        renderTabs();
        renderContent();
      });
      tabsEl.appendChild(btn);
      formData[key] = {};
    });

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.dataset.tab === activeTab) {
          btn.className = 'tab-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all bg-pink-500 text-white shadow-md';
        } else {
          btn.className = 'tab-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all bg-white text-gray-600 hover:bg-gray-100 shadow-sm';
        }
      });
    }

    function renderContent() {
      const content = document.getElementById('tabContent');
      const cat = INVENTORY[activeTab];
      let html = `<h2 class="text-xl font-bold text-gray-800 mb-4">${cat.icon} ${cat.label}</h2>`;

      Object.entries(cat.sections).forEach(([sectionName, items]) => {
        html += `<div class="mb-6">
          <h3 class="text-sm font-bold text-pink-600 uppercase tracking-wider mb-3 pb-2 border-b border-pink-100">${sectionName}</h3>
          <div class="grid sm:grid-cols-2 gap-3">`;

        items.forEach(item => {
          const currentVal = formData[activeTab][item.name] !== undefined ? formData[activeTab][item.name] : '';
          html += `
            <div class="flex items-center gap-2 p-2 hover:bg-pink-50 rounded-lg">
              <label class="flex-1 text-sm text-gray-700">${item.name}</label>
              <input
                type="number"
                step="0.01"
                min="0"
                placeholder="0"
                data-item="${item.name}"
                value="${currentVal}"
                class="w-20 px-2 py-1 text-sm border border-gray-300 rounded focus:border-pink-400 focus:outline-none"
              />
              <span class="text-xs text-gray-400 w-12">${item.unit}</span>
            </div>
          `;
        });
        html += `</div></div>`;
      });

      content.innerHTML = html;

      // Wire up inputs
      content.querySelectorAll('input[data-item]').forEach(inp => {
        inp.addEventListener('input', () => {
          const v = inp.value.trim();
          if (v === '') {
            delete formData[activeTab][inp.dataset.item];
          } else {
            formData[activeTab][inp.dataset.item] = parseFloat(v);
          }
        });
      });
    }

    renderTabs();
    renderContent();

    // Pre-fill today's existing inventory if any, otherwise pre-fill from latest saved
    async function preloadInventory() {
      let data = await getTodayInventory();
      let label = 'today';
      if (!data) {
        data = await getLatestInventory();
        label = 'latest';
      }
      if (data && data.items) {
        formData = data.items;
        // Make sure all categories exist
        Object.keys(INVENTORY).forEach(k => { if (!formData[k]) formData[k] = {}; });
        renderContent();
        if (label === 'today') {
          document.getElementById('message').innerHTML = '<p class="text-sm text-pink-600">✓ Loaded today\'s saved values. You can edit and save again.</p>';
        } else {
          document.getElementById('message').innerHTML = '<p class="text-sm text-gray-500">ℹ Pre-filled with last saved values. Update what changed.</p>';
        }
      }
    }
    preloadInventory().catch(err => console.error(err));

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const worker = prompt('Worker name (for record):') || 'Unknown';

      try {
        await saveInventory({
          items: formData,
          worker: worker,
          timestamp: new Date().toISOString()
        });
        document.getElementById('message').innerHTML = `<p class="text-pink-600 font-semibold">✓ Saved successfully!</p>`;
        btn.textContent = 'Saved ✓';
        setTimeout(() => { btn.textContent = 'Save Inventory'; btn.disabled = false; }, 2000);
      } catch (err) {
        document.getElementById('message').innerHTML = `<p class="text-red-600">✗ Error: ${err.message}</p>`;
        btn.textContent = 'Save Inventory';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
